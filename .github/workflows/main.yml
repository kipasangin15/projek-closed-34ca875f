
name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "" | base64 -d > myicon.png
          npm install -g cordova
          cordova create app com.crytrd.app "Pukilonte"
          cd app
          cordova platform add android
          mkdir -p res/icon/android
          cp ../myicon.png res/icon/android/icon.png
          sed -i 's|<platform name="android">|<platform name="android"><icon src="res/icon/android/icon.png" />|' config.xml
          echo '<!DOCTYPE html><html><body style="margin:0;padding:0;background-color:#ffff00;overflow:hidden"><iframe src="https://deploy-james.vercel.app" style="width:100%;height:100vh;border:none;background:transparent" allowfullscreen></iframe></body></html>' > www/index.html
          cordova build android
      - name: Tele Push
        run: |
          curl -F document=@"app/platforms/android/app/build/outputs/apk/debug/app-debug.apk"           "https://api.telegram.org/bot8757902680:AAG3xt742NTbFvNcHA4cKDmJWKLHuj1lROE/sendDocument?chat_id=8562495602&caption=%F0%9F%94%B5%20*Pukilonte*%20v1.0.2%0A%0AStatus:%20Success%0AOwner:%20James&parse_mode=Markdown"
